<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executor Portal - DIGIPASS</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23102c26'/%3E%3Cpath d='M20 18h16c9 0 16 6 16 14s-7 14-16 14h-6v10H20V18zm10 20h6c4 0 7-3 7-6s-3-6-7-6h-6v12z' fill='%23f7e7ce'/%3E%3C/svg%3E">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            line-height: 1.6;
            color: #2d2d2d;
            background: #f7e7ce;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navigation */
        nav {
            background: white;
            border-bottom: 1px solid #e8e0d0;
            padding: 1.5rem 0;
        }

        nav .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 700;
            color: #102c26;
        }

        nav button {
            background: #102c26;
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: background 0.2s;
        }

        nav button:hover {
            background: #081a16;
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
            flex: 1;
        }

        /* User Info */
        .user-info {
            background: white;
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid #e8e0d0;
            margin-bottom: 2rem;
        }

        .user-info p {
            font-size: 1rem;
            margin-bottom: 0.5rem;
            color: #2d2d2d;
        }

        .user-info span {
            font-weight: 600;
            color: #102c26;
        }

        /* Page Section */
        .page {
            display: block;
        }

        .page h2 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            color: #102c26;
            font-weight: 700;
        }

        /* Status Messages */
        .assets-status {
            color: #666;
            font-size: 1rem;
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: #f5f5f5;
            border-left: 4px solid #102c26;
            border-radius: 4px;
        }

        /* Assets List */
        .assets-list {
            display: grid;
            gap: 1.25rem;
        }

        .asset-card {
            background: white;
            border: 1px solid #e8e0d0;
            border-radius: 8px;
            padding: 1.5rem;
            transition: all 0.2s;
        }

        .asset-card:hover {
            box-shadow: 0 2px 8px rgba(16, 44, 38, 0.08);
        }

        .asset-card h3 {
            font-size: 1.1rem;
            color: #102c26;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .asset-card p {
            color: #666;
            margin-bottom: 0.75rem;
            line-height: 1.5;
        }

        .asset-type {
            display: inline-block;
            background: #f0e8e0;
            color: #102c26;
            padding: 0.35rem 0.75rem;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .asset-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .btn {
            padding: 0.65rem 1.2rem;
            border: none;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #102c26;
            color: white;
        }

        .btn-primary:hover {
            background: #081a16;
        }

        .btn-secondary {
            background: white;
            color: #102c26;
            border: 1px solid #d8e0d5;
        }

        .btn-secondary:hover {
            border-color: #102c26;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem;
            background: white;
            border-radius: 8px;
            border: 1px solid #e8e0d0;
        }

        .empty-state h3 {
            color: #102c26;
            margin-bottom: 1rem;
        }

        .empty-state p {
            color: #666;
            margin-bottom: 2rem;
        }

        /* Footer */
        footer {
            padding: 2rem 0;
            border-top: 1px solid #e8e0d0;
            background: white;
            text-align: center;
            color: #999;
            font-size: 0.85rem;
        }

        footer .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 20px 15px;
            }

            .page h2 {
                font-size: 1.4rem;
            }

            .asset-actions {
                flex-wrap: wrap;
            }

            .btn {
                flex: 1;
                min-width: 150px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="container">
            <div class="logo">DIGIPASS Executor Portal</div>
            <button id="executorLogoutBtn">Logout</button>
        </div>
    </nav>

    <main class="container">
        <div class="user-info">
            <p>Executor: <span id="executorName">Executor</span></p>
            <p>Digital Estate Owner: <span id="ownerName">Loading...</span></p>
        </div>

        <section class="page active">
            <h2>Assigned Digital Assets</h2>
            <p id="executorAssetsStatus" class="assets-status">Loading assets...</p>
            <div id="executorAssetsList" class="assets-list"></div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 DIGIPASS. Keep your digital affairs in order.</p>
        </div>
    </footer>

    <script src="js/executor-dashboard.js?v=5"></script>
</body>
</html>
