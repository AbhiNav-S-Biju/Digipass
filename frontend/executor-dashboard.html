<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executor Dashboard - DIGIPASS</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231b3a2d'/%3E%3Cpath d='M20 18h16c9 0 16 6 16 14s-7 14-16 14h-6v10H20V18zm10 20h6c4 0 7-3 7-6s-3-6-7-6h-6v12z' fill='%23fdf6ec'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            font-family: 'DM Sans', sans-serif;
        }

        h1, h2, h3, h4, h5, h6, .navbar-brand {
            font-family: 'DM Serif Display', serif;
        }

        :root {
            --cream: #f5ead8;
            --cream-light: #fdf6ec;
            --forest-deep: #1b3a2d;
            --forest-mid: #2d5a42;
            --forest-light: #3d7a5a;
            --sand: #e8d9c0;
            --sand-deep: #d4c4a0;
            --text-dark: #1a2e22;
            --text-muted: #5a7260;
            --accent-green: #3d7a5a;
            --accent-light: #d4ead8;
        }

        body {
            background-color: var(--cream);
            color: var(--text-dark);
        }

        /* Navbar */
        .navbar {
            background-color: var(--forest-deep) !important;
            height: 58px;
            padding: 0 2rem;
            box-shadow: none;
            border-bottom: none;
        }

        .navbar-brand {
            font-size: 20px;
            font-weight: 700;
            color: var(--cream-light) !important;
            letter-spacing: 0.04em;
        }

        .navbar-collapse {
            justify-content: flex-end;
        }

        .portal-tag {
            background-color: rgba(255, 255, 255, 0.1);
            color: rgba(245, 234, 216, 0.7);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            border-radius: 12px;
            padding: 4px 10px;
            margin-right: 12px;
            display: inline-block;
            font-weight: 500;
        }

        .btn-logout {
            background-color: rgba(255, 255, 255, 0.1) !important;
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            color: var(--cream-light) !important;
            font-weight: 500;
            padding: 7px 18px;
            border-radius: 6px;
            font-size: 13.5px;
        }

        .btn-logout:hover {
            background-color: rgba(255, 255, 255, 0.15) !important;
        }

        /* Profile Banner */
        .profile-banner {
            background-color: var(--forest-deep);
            padding: 28px 2rem 32px;
            margin-bottom: 32px;
        }

        .profile-banner-inner {
            max-width: 1040px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .profile-left {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .profile-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background-color: var(--forest-light);
            border: 2px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--cream-light);
            font-size: 22px;
            font-weight: 700;
            font-family: 'DM Serif Display', serif;
        }

        .profile-name {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .profile-name-text {
            font-size: 24px;
            font-weight: 700;
            color: var(--cream-light);
            font-family: 'DM Serif Display', serif;
            margin: 0;
        }

        .profile-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: rgba(245, 234, 216, 0.6);
        }

        .estate-badge {
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(245, 234, 216, 0.8);
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 10px;
            white-space: nowrap;
        }

        .profile-stats {
            display: flex;
            gap: 0;
        }

        .profile-stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 20px;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }

        .profile-stat:first-child {
            border-left: none;
            padding-left: 0;
        }

        .profile-stat-number {
            font-size: 26px;
            font-weight: 700;
            color: var(--cream-light);
            font-family: 'DM Serif Display', serif;
        }

        .profile-stat-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: rgba(245, 234, 216, 0.6);
            margin-top: 2px;
            font-weight: 600;
        }

        /* Page Content */
        .page-content {
            max-width: 1040px;
            margin: 0 auto;
            padding: 32px 2rem 3rem;
        }

        .page-header h1 {
            font-size: 34px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 4px;
        }

        .page-header p {
            font-size: 13.5px;
            color: var(--text-muted);
            margin-bottom: 28px;
        }

        /* Asset Cards Grid */
        .assets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 18px;
            margin-bottom: 2rem;
        }

        .asset-card {
            background-color: var(--cream-light);
            border: 1px solid var(--sand-deep);
            border-radius: 14px;
            overflow: hidden;
            transition: transform 0.2s ease;
        }

        .asset-card:hover {
            transform: translateY(-2px);
        }

        .asset-card-top {
            padding: 20px 20px 0;
        }

        .asset-card-header {
            display: flex;
            gap: 12px;
            margin-bottom: 14px;
        }

        .asset-card-icon {
            width: 40px;
            height: 40px;
            min-width: 40px;
            background-color: var(--sand);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .asset-card-icon svg {
            width: 22px;
            height: 22px;
            stroke: var(--text-muted);
            fill: none;
            stroke-width: 1.5;
        }

        .asset-card-details h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-dark);
            margin: 0 0 1px 0;
        }

        .asset-card-details p {
            font-size: 12.5px;
            color: var(--text-muted);
            margin: 0;
        }

        .asset-card-category {
            display: inline-block;
            font-size: 10.5px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 10px;
            letter-spacing: 0.04em;
            text-transform: capitalize;
            margin-top: 8px;
        }

        .category-social { background-color: #ddeaf5; color: #1a4a6e; }
        .category-finance { background-color: var(--accent-light); color: var(--forest-mid); }
        .category-storage { background-color: #f0e6d4; color: #7a4f1a; }
        .category-email { background-color: #ede8f5; color: #4a3080; }
        .category-entertainment { background-color: var(--sand); color: var(--text-muted); }
        .category-other { background-color: var(--sand); color: var(--text-muted); }

        .asset-card-message {
            margin: 0 20px 16px;
            background-color: var(--sand);
            border-radius: 10px;
            padding: 14px 16px;
        }

        .asset-card-message-label {
            display: flex;
            gap: 6px;
            align-items: center;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin-bottom: 6px;
        }

        .asset-card-message-label svg {
            width: 12px;
            height: 12px;
            stroke: var(--text-muted);
        }

        .asset-card-message-text {
            font-size: 13.5px;
            color: var(--text-dark);
            line-height: 1.55;
            font-style: italic;
        }

        .asset-card-message-text::before,
        .asset-card-message-text::after {
            content: '"';
        }

        .asset-card-status {
            padding: 10px 20px 14px;
            display: flex;
            gap: 8px;
            align-items: center;
            font-size: 12px;
            color: var(--text-muted);
        }

        .asset-card-status-dot {
            width: 7px;
            height: 7px;
            background-color: #8cbf9c;
            border-radius: 50%;
        }

        .asset-card-footer {
            border-top: 1px solid var(--sand-deep);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .asset-card-date {
            font-size: 11.5px;
            color: var(--text-muted);
        }

        .btn-view-instructions {
            background-color: var(--forest-deep) !important;
            color: var(--cream-light) !important;
            font-size: 12px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 7px;
            border: none;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
        }

        .btn-view-instructions:hover {
            background-color: var(--forest-mid) !important;
            transform: translateY(-1px);
        }

        .btn-view-instructions svg {
            width: 13px;
            height: 13px;
            stroke: var(--cream-light);
            fill: none;
            stroke-width: 1.5;
        }

        /* Empty state */
        .alert-info {
            background-color: var(--cream-light);
            border: 1px solid var(--sand-deep);
            color: var(--text-dark);
            border-radius: 14px;
            padding: 20px;
            text-align: center;
        }

        /* Modal */
        .modal-content {
            background-color: var(--cream-light);
            border: 1px solid var(--sand-deep);
            border-radius: 14px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        .modal-header {
            background-color: transparent;
            border-bottom: 1px solid var(--sand-deep);
            padding: 20px;
        }

        .modal-header h5 {
            font-family: 'DM Serif Display', serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-dark);
            margin: 0 0 4px 0;
        }

        .modal-header p {
            margin: 0;
            font-size: 12px;
            color: var(--text-muted);
        }

        .modal-header .btn-close {
            background-color: transparent;
            border: none;
            opacity: 0.7;
            width: 24px;
            height: 24px;
        }

        .modal-header .btn-close:hover {
            opacity: 1;
        }

        .modal-body {
            padding: 20px;
            color: var(--text-dark);
            font-size: 14px;
            line-height: 1.6;
        }

        .modal-body h6 {
            font-family: 'DM Serif Display', serif;
            font-size: 16px;
            font-weight: 700;
            color: var(--text-dark);
            margin-top: 16px;
            margin-bottom: 8px;
        }

        .modal-body h6:first-child {
            margin-top: 0;
        }

        .modal-body .card {
            background-color: transparent;
            border: 1px solid var(--sand-deep);
            border-radius: 10px;
            margin-bottom: 16px;
        }

        .modal-body .card-header {
            background-color: rgba(227, 217, 192, 0.3);
            border-bottom: 1px solid var(--sand-deep);
            padding: 12px 16px;
        }

        .modal-body .card-header h6 {
            font-size: 14px;
            margin: 0;
            display: flex;
            gap: 8px;
            align-items: center;
            color: var(--text-dark);
        }

        .modal-body .card-body {
            padding: 16px;
        }

        .modal-body .input-group {
            margin-bottom: 12px;
        }

        .modal-body .form-control {
            border: 1px solid var(--sand-deep);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 13px;
            background-color: var(--cream);
        }

        .modal-body .form-control:focus {
            border-color: var(--forest-deep);
            box-shadow: 0 0 0 3px rgba(61, 122, 90, 0.1);
            background-color: white;
        }

        .modal-body .btn {
            font-size: 12px;
            padding: 7px 14px;
            border-radius: 7px;
            font-weight: 500;
        }

        .modal-footer {
            background-color: transparent;
            border-top: 1px solid var(--sand-deep);
            padding: 16px 20px;
        }

        .modal-footer .btn {
            font-size: 13px;
            padding: 8px 16px;
            border-radius: 7px;
            font-weight: 500;
        }

        .modal-footer .btn-secondary {
            background-color: transparent;
            color: var(--forest-deep);
            border: 1px solid var(--sand-deep);
        }

        .modal-footer .btn-secondary:hover {
            background-color: var(--sand);
            border-color: var(--sand-deep);
        }

        .modal-footer .btn-primary {
            background-color: var(--forest-deep);
            color: var(--cream-light);
            border: none;
        }

        .modal-footer .btn-primary:hover {
            background-color: var(--forest-mid);
        }

        .modal-body .alert-warning {
            background-color: rgba(232, 217, 192, 0.4);
            border: 1px solid var(--sand-deep);
            color: var(--text-dark);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 12px;
        }

        .modal-body .text-muted {
            color: var(--text-muted);
        }

        .modal-body a {
            color: var(--forest-deep);
            text-decoration: none;
            font-weight: 500;
        }

        .modal-body a:hover {
            text-decoration: underline;
        }

        /* Modal backdrop */
        .modal-backdrop {
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal-body .spinner-border {
            color: var(--forest-deep);
        }

        /* Responsive */
        @media (max-width: 860px) {
            .profile-banner {
                padding: 20px 1rem 24px;
            }

            .profile-banner-inner {
                flex-direction: column;
                align-items: flex-start;
            }

            .profile-stats {
                width: 100%;
                justify-content: space-between;
            }

            .page-content {
                padding: 28px 1rem 3rem;
            }

            .page-header h1 {
                font-size: 28px;
            }
        }

        @media (max-width: 640px) {
            .navbar {
                padding: 0 1rem;
            }

            .navbar-brand {
                font-size: 18px;
            }

            .portal-tag {
                display: none;
            }

            .profile-banner {
                padding: 20px 1rem 24px;
            }

            .profile-banner-inner {
                flex-direction: column;
                align-items: flex-start;
            }

            .profile-avatar {
                width: 44px;
                height: 44px;
                font-size: 18px;
            }

            .profile-name-text {
                font-size: 20px;
            }

            .profile-stats {
                width: 100%;
                gap: 0;
            }

            .profile-stat {
                flex: 1;
                padding: 0 12px;
                border-left: 1px solid rgba(255, 255, 255, 0.1);
            }

            .profile-stat:first-child {
                padding-left: 0;
                border-left: none;
            }

            .profile-stat-number {
                font-size: 20px;
            }

            .page-content {
                padding: 24px 1rem 2rem;
            }

            .page-header h1 {
                font-size: 24px;
            }

            .page-header p {
                font-size: 12px;
                margin-bottom: 20px;
            }

            .assets-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .asset-card {
                border-radius: 12px;
            }

            .asset-card-top {
                padding: 16px 16px 0;
            }

            .asset-card-message {
                margin: 0 16px 12px;
            }

            .asset-card-footer {
                padding: 12px 16px;
            }

            .btn-view-instructions {
                font-size: 11px;
                padding: 6px 12px;
            }
        }

        /* ============================================
           WORKFLOW PANEL STYLES
           ============================================ */

        .workflow-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: 360px 1fr;
            background: var(--cream);
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .workflow-panel-visible {
            opacity: 1;
            pointer-events: auto;
        }

        .workflow-panel-hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Left Panel: Steps */
        .workflow-steps-panel {
            background: var(--forest-deep);
            color: var(--cream-light);
            padding: 20px;
            overflow-y: auto;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
        }

        .steps-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .steps-header h3 {
            font-family: 'DM Serif Display', serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--cream-light);
            margin: 0;
        }

        .workflow-close-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--cream-light);
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 16px;
        }

        .workflow-close-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.05);
        }

        .steps-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .step-item {
            display: flex;
            gap: 12px;
            padding: 14px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: transparent;
            border: 1px solid transparent;
            align-items: flex-start;
        }

        .step-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .step-item-active {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--sand);
            border-left: 4px solid var(--sand);
            padding-left: 10px;
        }

        .step-item-completed {
            opacity: 0.75;
        }

        .step-item-number {
            width: 28px;
            height: 28px;
            min-width: 28px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 12px;
            flex-shrink: 0;
        }

        .step-item-completed .step-item-number {
            background: #8cbf9c;
            color: var(--forest-deep);
        }

        .step-item-content {
            flex: 1;
            min-width: 0;
        }

        .step-item-content h5 {
            font-family: 'DM Serif Display', serif;
            font-size: 13px;
            font-weight: 600;
            color: var(--cream-light);
            margin: 0 0 2px 0;
        }

        .step-item-content p {
            font-size: 11px;
            color: rgba(245, 234, 216, 0.65);
            margin: 0;
            line-height: 1.4;
            word-break: break-word;
        }

        .steps-footer {
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--sand), #8cbf9c);
            width: 0%;
            transition: width 0.4s ease;
            border-radius: 2px;
        }

        .progress-text {
            font-size: 11px;
            color: rgba(245, 234, 216, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-weight: 600;
        }

        /* Right Panel: Preview */
        .workflow-preview-panel {
            background: var(--cream-light);
            padding: 32px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .step-preview-container {
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .step-preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--sand-deep);
        }

        .step-preview-header h3 {
            font-family: 'DM Serif Display', serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--text-dark);
            margin: 0;
        }

        .step-badge {
            background: var(--sand);
            color: var(--text-dark);
            font-size: 11px;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .video-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 14px;
            overflow: hidden;
            background: var(--sand);
            margin-bottom: 24px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .youtube-video {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 8px;
        }

        .image-container {
            width: 100%;
            height: 360px;
            background: var(--sand);
            margin-bottom: 24px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .video-fallback {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(135deg, var(--sand) 0%, var(--cream-light) 100%);
            color: var(--text-muted);
        }

        .video-fallback i {
            font-size: 48px;
            color: var(--forest-deep);
            opacity: 0.6;
        }

        .video-fallback p {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
            margin: 0;
        }

        .video-fallback small {
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            max-width: 200px;
            line-height: 1.5;
        }

        .step-details {
            flex: 1;
            min-height: 0;
        }

        .step-details h4 {
            font-family: 'DM Serif Display', serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
            margin: 0 0 12px 0;
        }

        .step-action {
            font-size: 14px;
            color: var(--text-dark);
            line-height: 1.6;
            margin: 0 0 20px 0;
            padding: 14px 16px;
            background: var(--sand);
            border-radius: 10px;
            border-left: 4px solid var(--forest-deep);
        }

        /* Credentials Section */
        .credentials-section {
            margin-bottom: 20px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .credentials-header {
            background: var(--sand);
            padding: 12px 16px;
            font-weight: 600;
            color: var(--text-dark);
            font-size: 13px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .credentials-header i {
            font-size: 14px;
        }

        .credentials-body {
            background: white;
            padding: 16px;
            border-top: 1px solid var(--sand-deep);
        }

        .credential-item {
            margin-bottom: 14px;
        }

        .credential-item:last-child {
            margin-bottom: 0;
        }

        .credential-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }

        .credential-value-wrapper {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .credential-value {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid var(--sand-deep);
            border-radius: 8px;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            background: var(--cream);
            color: var(--text-dark);
            cursor: text;
            transition: all 0.2s ease;
        }

        .credential-value:focus {
            outline: none;
            border-color: var(--forest-deep);
            box-shadow: 0 0 0 3px rgba(27, 58, 45, 0.1);
        }

        .credential-toggle-btn,
        .credential-copy-btn {
            width: 36px;
            height: 36px;
            border: 1px solid var(--sand-deep);
            background: var(--cream);
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
        }

        .credential-toggle-btn:hover,
        .credential-copy-btn:hover {
            background: var(--sand);
            color: var(--forest-deep);
            border-color: var(--forest-deep);
        }

        /* Farewell Message Box */
        .farewell-message-box {
            margin-bottom: 20px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            border-left: 4px solid #E50914;
            background: white;
        }

        .farewell-message-header {
            background: #ffe0e6;
            padding: 12px 16px;
            font-weight: 600;
            color: #c41e3a;
            font-size: 13px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .farewell-message-header i {
            font-size: 14px;
        }

        .farewell-message-body {
            background: white;
            padding: 16px;
            border-top: 1px solid #f0d5dd;
        }

        .farewell-message-body p {
            margin: 0 0 12px 0;
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-dark);
            word-break: break-word;
            white-space: pre-wrap;
        }

        .farewell-message-body .credential-copy-btn {
            margin-top: 8px;
            background: #ffe0e6;
            border-color: #f0d5dd;
            color: #c41e3a;
        }

        .farewell-message-body .credential-copy-btn:hover {
            background: #ffc5d2;
            border-color: #c41e3a;
        }

        .credential-toggle-btn:hover,
        .credential-copy-btn:hover {
            background: var(--sand);
            color: var(--text-dark);
        }

        /* Tips Section */
        .step-tips {
            background: rgba(140, 191, 156, 0.1);
            border: 1px solid #8cbf9c;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 20px;
        }

        .step-tips h6 {
            font-family: 'DM Serif Display', serif;
            font-size: 13px;
            font-weight: 600;
            color: var(--forest-deep);
            margin: 0 0 10px 0;
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .step-tips ul {
            margin: 0;
            padding-left: 20px;
        }

        .step-tips li {
            font-size: 12px;
            color: var(--forest-mid);
            margin-bottom: 6px;
            line-height: 1.5;
        }

        .step-tips li:last-child {
            margin-bottom: 0;
        }

        /* Navigation */
        .step-navigation {
            display: flex;
            gap: 12px;
            justify-content: space-between;
            margin-top: auto;
            padding: 16px;
            border-top: 1px solid var(--sand-deep);
            background: white;
            position: relative;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        .workflow-btn {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--sand-deep);
            background: white;
            color: var(--text-dark);
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            white-space: nowrap;
        }

        .workflow-btn:hover:not(:disabled) {
            background: var(--sand);
            border-color: var(--sand-deep);
        }

        .workflow-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Action Selector Modal */
        .action-selector-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            animation: fadeIn 0.3s ease;
        }

        .action-selector-content {
            background: var(--cream-light);
            border-radius: 12px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: slideUp 0.3s ease;
        }

        .action-selector-header {
            background: linear-gradient(135deg, var(--forest-deep), var(--forest-mid));
            color: var(--cream-light);
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .action-selector-header h3 {
            margin: 0;
            font-size: 1.3rem;
            font-family: 'DM Serif Display', serif;
        }

        .action-selector-close {
            background: transparent;
            border: none;
            color: var(--cream-light);
            font-size: 28px;
            cursor: pointer;
            opacity: 0.8;
            transition: opacity 0.2s ease;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-selector-close:hover {
            opacity: 1;
        }

        .action-selector-body {
            padding: 24px;
        }

        .action-selector-body p {
            color: var(--text-muted);
            margin-bottom: 20px;
            font-size: 0.95rem;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .action-btn {
            padding: 14px 20px;
            background: white;
            border: 2px solid var(--sand);
            border-radius: 8px;
            color: var(--text-dark);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
        }

        .action-btn:hover {
            background: var(--sand);
            border-color: var(--forest-mid);
            transform: translateX(4px);
        }

        .action-btn:active {
            transform: translateX(4px) scale(0.98);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .workflow-btn-complete {
            background: var(--forest-deep);
            color: var(--cream-light);
            border-color: var(--forest-deep);
        }

        .workflow-btn-complete:hover:not(:disabled) {
            background: var(--forest-mid);
            border-color: var(--forest-mid);
        }

        /* Toast Notification */
        .workflow-toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--forest-deep);
            color: var(--cream-light);
            padding: 12px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 4px 16px rgba(27, 58, 45, 0.2);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            z-index: 3000;
        }

        .workflow-toast-show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .workflow-panel {
                grid-template-columns: 280px 1fr;
            }

            .workflow-steps-panel {
                padding: 16px;
            }

            .workflow-preview-panel {
                padding: 24px;
            }

            .step-preview-container {
                max-width: 600px;
            }
        }

        @media (max-width: 860px) {
            .workflow-panel {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
            }

            .workflow-steps-panel {
                max-height: 200px;
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                padding: 12px;
            }

            .steps-list {
                flex-direction: row;
                gap: 8px;
                overflow-x: auto;
            }

            .step-item {
                flex-shrink: 0;
                width: 90px;
                flex-direction: column;
                gap: 6px;
                padding: 10px 8px;
            }

            .step-item-content h5,
            .step-item-content p {
                display: none;
            }

            .workflow-preview-panel {
                padding: 20px;
            }

            .step-preview-header {
                margin-bottom: 16px;
            }

            .video-container {
                margin-bottom: 16px;
            }

            .step-navigation {
                flex-direction: column;
            }

            .workflow-btn {
                width: 100%;
            }
        }

        @media (max-width: 640px) {
            .workflow-close-btn {
                width: 32px;
                height: 32px;
                font-size: 14px;
            }

            .steps-header h3 {
                font-size: 16px;
            }

            .step-preview-header h3 {
                font-size: 18px;
            }

            .step-details h4 {
                font-size: 16px;
            }

            .workflow-preview-panel {
                padding: 16px;
            }

            .video-container {
                aspect-ratio: 4 / 3;
            }

            .step-navigation {
                gap: 8px;
            }

            .workflow-btn {
                padding: 8px 10px;
                font-size: 11px;
            }
        }
    </style>
</head>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = 'https://digipass-3l63.onrender.com';

        // Check if executor is logged in
        const token = localStorage.getItem('executorToken');
        if (!token) {
            location.href = 'executor-login.html';
        }

        const executor = JSON.parse(localStorage.getItem('executor') || '{}');
        const executorName = executor.ownerName || 'Estate Owner';
        const estateName = executor.ownerName || 'Your Estate';
        
        // Update profile banner
        document.getElementById('executorName').textContent = executorName;
        document.getElementById('inheritanceName').textContent = estateName;
        document.getElementById('estateName').textContent = estateName.split(' ')[0];
        
        // Generate avatar initials
        const initials = executorName.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
        document.getElementById('executorAvatar').textContent = initials;

        // Logout functionality
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('executorToken');
            localStorage.removeItem('executor');
            location.href = 'executor-login.html';
        });

        // Load assets
        async function loadAssets() {
            try {
                const response = await fetch(`${API_URL}/api/executor/assets`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();

                // Handle authentication errors
                if (response.status === 401) {
                    console.warn('Unauthorized - redirecting to login');
                    location.href = 'executor-login.html';
                    return;
                }

                // Handle access denied
                if (response.status === 403) {
                    console.warn('Access denied - executor does not have access yet');
                    document.getElementById('assetsList').innerHTML = '';
                    document.getElementById('assetCount').textContent = '0';
                    const emptyState = document.getElementById('emptyState');
                    if (emptyState) {
                        emptyState.innerHTML = '<div class="alert alert-warning"><strong>Access Pending</strong><br>Your administrator has not granted you access to the assets yet. Please contact them to grant access.</div>';
                        emptyState.classList.remove('d-none');
                    }
                    return;
                }

                // Handle other errors
                if (!response.ok || !data.success) {
                    console.error('Failed to load assets:', data.message);
                    document.getElementById('assetsList').innerHTML = '';
                    document.getElementById('assetCount').textContent = '0';
                    const emptyState = document.getElementById('emptyState');
                    if (emptyState) {
                        emptyState.innerHTML = `<div class="alert alert-danger"><strong>Error</strong><br>${escapeHtml(data.message || 'Failed to load assets')}</div>`;
                        emptyState.classList.remove('d-none');
                    }
                    return;
                }

                // Get assets from response
                const assets = data.data && data.data.assets ? data.data.assets : [];

                if (assets && assets.length > 0) {
                    const assetsList = document.getElementById('assetsList');
                    assetsList.innerHTML = assets.map(asset => {
                        const categoryClass = `category-${asset.category || 'other'}`;
                        const assetDate = new Date(asset.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                        
                        return `
                            <div class="asset-card">
                                <div class="asset-card-top">
                                    <div class="asset-card-header">
                                        <div class="asset-card-icon">
                                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                                <rect x="3" y="4" width="18" height="16" rx="2" ry="2"></rect>
                                                <path d="M3 11h18"></path>
                                            </svg>
                                        </div>
                                        <div class="asset-card-details">
                                            <h3>${escapeHtml(asset.platform_name)}</h3>
                                            <p>${escapeHtml(asset.account_identifier || 'N/A')}</p>
                                            <div class="asset-card-category ${categoryClass}">${asset.category || 'other'}</div>
                                        </div>
                                    </div>
                                </div>
                                ${asset.last_message ? `
                                <div class="asset-card-message">
                                    <div class="asset-card-message-label">
                                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                                        </svg>
                                        Final Message
                                    </div>
                                    <div class="asset-card-message-text">${escapeHtml(asset.last_message.substring(0, 100))}${asset.last_message.length > 100 ? '...' : ''}</div>
                                </div>
                                ` : ''}
                                <div class="asset-card-status">
                                    <div class="asset-card-status-dot"></div>
                                    <span>Ready to access</span>
                                </div>
                                <div class="asset-card-footer">
                                    <span class="asset-card-date">Added ${assetDate}</span>
                                    <button class="btn-view-instructions" data-asset-id="${asset.asset_id}" data-platform="${asset.platform_name}" data-account="${asset.account_identifier || asset.asset_id}" data-action="${asset.action_type}" data-password="${asset.account_password ? asset.account_password.replace(/"/g, '&quot;') : ''}" data-message="${asset.last_message ? asset.last_message.replace(/"/g, '&quot;') : ''}">
                                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                            <polyline points="14 2 14 8 20 8"></polyline>
                                            <line x1="12" y1="19" x2="12" y2="5"></line>
                                            <line x1="9" y1="14" x2="15" y2="14"></line>
                                        </svg>
                                        View Instructions
                                    </button>
                                    </button>
                                </div>
                            </div>
                        `;
                    }).join('');
                    
                    // Add event listener for view instructions buttons
                    const assetListContainer = document.getElementById('assetsList');
                    assetListContainer.addEventListener('click', (e) => {
                        const btn = e.target.closest('.btn-view-instructions');
                        if (btn) {
                            const assetId = btn.dataset.assetId;
                            const platform = btn.dataset.platform;
                            const account = btn.dataset.account;
                            const action = btn.dataset.action;
                            const message = btn.dataset.message || null;
                            const password = btn.dataset.password || null;
                            
                            openWorkflowDirect(parseInt(assetId), platform, account, action, message || null, password || null);
                        }
                    });
                    
                    // Update asset count in profile stats
                    document.getElementById('assetCount').textContent = assets.length;
                    
                    const emptyState = document.getElementById('emptyState');
                    if (emptyState) {
                        emptyState.classList.add('d-none');
                    }
                } else {
                    document.getElementById('assetsList').innerHTML = '';
                    document.getElementById('assetCount').textContent = '0';
                    const emptyState = document.getElementById('emptyState');
                    if (emptyState) {
                        emptyState.classList.remove('d-none');
                    }
                }
            } catch (error) {
                console.error('Asset loading error:', error);
                document.getElementById('assetsList').innerHTML = '';
                document.getElementById('assetCount').textContent = '0';
                const emptyState = document.getElementById('emptyState');
                if (emptyState) {
                    emptyState.innerHTML = '<div class="alert alert-danger"><strong>Error</strong><br>Failed to load assets. Please refresh the page or contact support.</div>';
                    emptyState.classList.remove('d-none');
                }
            }
        }

        // Copy text to clipboard (for final messages)
        function copyToClipboard(elementId) {
            const element = document.getElementById(elementId);
            if (!element) return;
            
            const text = element.value || element.textContent;
            
            navigator.clipboard.writeText(text).then(() => {
                const btn = event?.target.closest('button');
                if (btn) {
                    const originalText = btn.innerHTML;
                    btn.innerHTML = '📋 Copied!';
                    setTimeout(() => {
                        btn.innerHTML = originalText;
                    }, 2000);
                }
            }).catch((err) => {
                console.error('Copy failed:', err);
                try {
                    element.select();
                    document.execCommand('copy');
                    const btn = event?.target.closest('button');
                    if (btn) {
                        const originalText = btn.innerHTML;
                        btn.innerHTML = '📋 Copied!';
                        setTimeout(() => {
                            btn.innerHTML = originalText;
                        }, 2000);
                    }
                } catch (e) {
                    alert('Could not copy. Please try manually selecting the text.');
                }
            });
        }

        // Save asset progress to localStorage
        function saveAssetProgress(assetId) {
            const checkboxes = document.querySelectorAll(`input[data-asset="${assetId}"]`);
            const progress = [];
            checkboxes.forEach((checkbox, index) => {
                progress.push(checkbox.checked);
            });
            localStorage.setItem(`assetProgress-${assetId}`, JSON.stringify(progress));
        }

        // Load asset progress from localStorage
        function loadAssetProgress(assetId) {
            const saved = localStorage.getItem(`assetProgress-${assetId}`);
            if (saved) {
                const progress = JSON.parse(saved);
                const checkboxes = document.querySelectorAll(`input[data-asset="${assetId}"]`);
                checkboxes.forEach((checkbox, index) => {
                    checkbox.checked = progress[index] || false;
                });
            }
        }

        // Helper: Escape HTML for safe display
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Toggle password visibility
        function togglePasswordVisibility(fieldId) {
            const element = document.getElementById(fieldId);
            if (!element) return;
            
            if (element.type === 'password') {
                element.type = 'text';
            } else {
                element.type = 'password';
            }
        }

        // Copy credential to clipboard
        function copyCredential(fieldId) {
            const element = document.getElementById(fieldId);
            if (!element) return;
            
            const text = element.value || element.textContent;
            
            navigator.clipboard.writeText(text).then(() => {
                // Show success toast
                const btn = event?.target.closest('button');
                if (btn) {
                    const originalText = btn.textContent || btn.innerHTML;
                    btn.textContent = '✓ Copied!';
                    btn.innerHTML = '✓ Copied!';
                    setTimeout(() => {
                        btn.textContent = originalText;
                        btn.innerHTML = originalText;
                    }, 2000);
                }
            }).catch((err) => {
                console.error('Copy failed:', err);
                // Fallback: try selecting and copying
                try {
                    element.select?.();
                    document.execCommand('copy');
                    const btn = event?.target.closest('button');
                    if (btn) {
                        const originalText = btn.textContent || btn.innerHTML;
                        btn.textContent = '✓ Copied!';
                        btn.innerHTML = '✓ Copied!';
                        setTimeout(() => {
                            btn.textContent = originalText;
                            btn.innerHTML = originalText;
                        }, 2000);
                    }
                } catch (e) {
                    console.warn('Fallback copy failed:', e);
                }
            });
        }

        loadAssets();
    </script>
