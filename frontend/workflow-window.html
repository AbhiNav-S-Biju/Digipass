<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIGIPASS - Workflow Instructions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #f7e7ce;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        
        .workflow-container {
            display: flex;
            height: 100vh;
            gap: 0;
        }
        
        .instructions-panel {
            width: 50%;
            background-color: #f7e7ce;
            color: #102c26;
            padding: 20px;
            overflow-y: auto;
            border-right: 3px solid #102c26;
        }
        
        .platform-panel {
            width: 50%;
            background: linear-gradient(135deg, #f7e7ce 0%, #f0dcc0 100%);
            display: flex;
            flex-direction: column;
            padding: 0;
            overflow: hidden;
        }
        
        .platform-panel-header {
            padding: 15px 20px;
            background-color: white;
            border-bottom: 2px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .platform-panel-header h5 {
            margin: 0;
            font-size: 1.1rem;
            color: #102c26;
            font-weight: 600;
        }
        
        .platform-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
        }
        
        .platform-icon {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #102c26;
            opacity: 0.8;
        }
        
        .platform-message h4 {
            color: #102c26;
            margin-bottom: 15px;
            font-weight: 600;
        }
        
        .platform-message p {
            color: #555;
            font-size: 0.95rem;
            margin-bottom: 10px;
            line-height: 1.6;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f0f0f0;
            border-top: 4px solid #102c26;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        #platformIframe {
            flex: 1;
            border: none;
            width: 100%;
            height: 100%;
            background-color: white;
            display: none;
        }
        
        .instructions-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #102c26;
        }
        
        .instructions-header h4 {
            margin: 0;
            color: #102c26;
            font-weight: 600;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #102c26;
        }
        
        .close-btn:hover {
            color: #0a1f1a;
        }
        
        .credentials-box {
            background-color: rgba(16, 44, 38, 0.08);
            border: 2px solid #102c26;
            border-radius: 6px;
            padding: 14px;
            margin-bottom: 20px;
        }
        
        .credentials-box h5 {
            font-size: 0.95rem;
            font-weight: 600;
            color: #102c26;
            margin-bottom: 10px;
        }
        
        .credential-field {
            margin-bottom: 10px;
            font-size: 0.9rem;
        }
        
        .credential-field strong {
            color: #102c26;
            display: block;
            margin-bottom: 3px;
        }
        
        .credential-value {
            background: white;
            padding: 6px 8px;
            border-radius: 3px;
            border: 1px solid #102c26;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
        }
        
        .steps-container {
            margin-top: 20px;
        }
        
        .steps-container h5 {
            color: #102c26;
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 0.95rem;
        }
        
        .step-item {
            background: white;
            border: 1px solid #e0d4c0;
            border-radius: 4px;
            padding: 12px;
            margin-bottom: 12px;
        }
        
        .step-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        
        .step-number {
            background: #102c26;
            color: #f7e7ce;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: 600;
            font-size: 0.9rem;
            flex-shrink: 0;
        }
        
        .step-title {
            font-weight: 600;
            color: #102c26;
            margin: 0;
        }
        
        .step-description {
            font-size: 0.9rem;
            color: #555;
            margin: 6px 0;
            line-height: 1.4;
        }
        
        .step-action {
            font-size: 0.85rem;
            color: #102c26;
            background: #f9f6f1;
            padding: 6px;
            border-radius: 3px;
            margin: 0;
        }
        
        .platform-panel h3 {
            color: #102c26;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .open-platform-btn {
            background-color: #102c26;
            color: #f7e7ce;
            border: none;
            padding: 14px 28px;
            font-size: 1.1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .open-platform-btn:hover {
            background-color: #0a1f1a;
            color: #f7e7ce;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #102c26;
        }
        
        .error-msg {
            background-color: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 4px;
            margin: 12px 0;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="workflow-container">
        <!-- LEFT: Instructions -->
        <div class="instructions-panel">
            <div class="instructions-header">
                <h4><i class="fas fa-tasks"></i> <span id="platformName">Instructions</span></h4>
                <button class="close-btn" onclick="window.close()" title="Close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div id="content">
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i> Loading instructions...
                </div>
            </div>
        </div>
        
        <!-- RIGHT: Platform Window -->
        <div class="platform-panel">
            <div class="platform-panel-header">
                <h5 id="platformHeaderName"><i class="fas fa-external-link-alt"></i> Platform</h5>
            </div>
            <div class="platform-content" id="platformContent">
                <div class="loading-spinner"></div>
                <div class="platform-message">
                    <h4 id="platformLoadingText">Opening Instagram...</h4>
                    <p>A new window is opening with the <span id="platformNameMsg">Instagram</span> login page.</p>
                    <p style="margin-top: 20px; font-size: 0.85rem; color: #888;">
                        If the window doesn't appear, check your browser's popup blocker settings.
                    </p>
                    <button class="btn btn-dark" style="margin-top: 20px;" onclick="retryOpenPlatform()">
                        <i class="fas fa-redo"></i> Open Again
                    </button>
                </div>
            </div>
            <iframe id="platformIframe" title="Platform login"></iframe>
        </div>
    </div>
    
    <script>
        const API_URL = 'https://digipass-3l63.onrender.com/api';
        let platformUrl = '';
        let platformName = '';
        
        async function loadInstructions() {
            try {
                const assetId = sessionStorage.getItem('digipass_asset_id');
                const token = sessionStorage.getItem('digipass_token');
                const url = sessionStorage.getItem('digipass_platform_url');
                platformName = sessionStorage.getItem('digipass_platform_name') || 'Platform';
                platformUrl = url;
                
                document.getElementById('platformName').textContent = platformName;
                document.getElementById('platformHeaderName').textContent = platformName;
                document.getElementById('platformNameMsg').textContent = platformName;
                document.getElementById('platformLoadingText').textContent = `Opening ${platformName}...`;
                
                // Auto-open the platform in a new positioned window
                setTimeout(() => {
                    openPlatformWindow();
                }, 500);
                
                if (!assetId || !token) {
                    document.getElementById('content').innerHTML = '<div class="error-msg"><i class="fas fa-exclamation-triangle"></i> Error: Missing asset or token. Please close and try again.</div>';
                    return;
                }
                
                const response = await fetch(`${API_URL}/executor/asset-instructions/${assetId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                // Handle 304 Not Modified
                if (response.status === 304) {
                    throw new Error('Cached response - please try again or refresh the page');
                }
                
                if (!response.ok) {
                    const errorData = await response.text();
                    console.error('API Error:', response.status, errorData);
                    throw new Error(`Failed to load instructions (${response.status}): ${errorData}`);
                }
                
                const data = await response.json();
                console.log('API Response:', data);
                
                // Validate response structure
                if (!data.success || !data.data || !data.data.instructions) {
                    console.error('Invalid response structure:', data);
                    throw new Error('Invalid response structure from server');
                }
                
                const asset = data.data.asset;
                const instructionsObj = data.data.instructions;
                
                // Instructions is an object with steps property
                let instructions = instructionsObj.steps || instructionsObj;
                
                // Additional validation
                if (!Array.isArray(instructions)) {
                    console.error('Instructions is not an array:', instructions, 'Full object:', instructionsObj);
                    throw new Error('Instructions data is invalid - expected array');
                }
                
                let html = '';
                
                // Add credentials if available
                if (asset.account_password) {
                    html += `
                        <div class="credentials-box">
                            <h5><i class="fas fa-key"></i> Login Credentials</h5>
                            <div class="credential-field">
                                <strong>Username / Email</strong>
                                <div class="credential-value">${escapeHtml(asset.account_identifier)}</div>
                            </div>
                            <div class="credential-field">
                                <strong>Password</strong>
                                <div class="credential-value">${escapeHtml(asset.account_password)}</div>
                            </div>
                        </div>
                    `;
                }
                
                // Add instructions
                html += '<div class="steps-container"><h5><i class="fas fa-list"></i> Steps to Follow</h5>';
                instructions.forEach((step, i) => {
                    html += `
                        <div class="step-item">
                            <div class="step-header">
                                <div class="step-number">${i + 1}</div>
                                <h6 class="step-title">${escapeHtml(step.title)}</h6>
                            </div>
                            <p class="step-description">${escapeHtml(step.description)}</p>
                            <p class="step-action"><strong>Action:</strong> ${escapeHtml(step.action)}</p>
                        </div>
                    `;
                });
                html += '</div>';
                
                document.getElementById('content').innerHTML = html;
                
            } catch (e) {
                console.error('Full error:', e);
                document.getElementById('content').innerHTML = `<div class="error-msg"><i class="fas fa-exclamation-triangle"></i> Error: ${e.message}</div>`;
            }
        }
        
        function showIframeFallback() {
            document.getElementById('platformIframe').style.display = 'none';
            document.getElementById('iframeFallback').style.display = 'flex';
            
            // Open the platform in a separate window since iframe is blocked
            if (platformUrl) {
                openPlatformWindow();
            }
        }
        
        function openPlatformWindow() {
            if (platformUrl) {
                // Open platform in a new window positioned to the right
                const screenWidth = window.screen.width;
                const screenHeight = window.screen.height;
                const leftPos = Math.floor(screenWidth / 2);
                const width = Math.floor(screenWidth / 2);
                
                window.open(
                    platformUrl, 
                    platformName.replace(/\s+/g, '_'), 
                    `width=${width},height=${screenHeight},left=${leftPos},top=0,resizable=yes,scrollbars=yes`
                );
            }
        }
        
        function retryOpenPlatform() {
            openPlatformWindow();
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Load when page opens
        setTimeout(loadInstructions, 500);
    </script>
</body>
</html>
