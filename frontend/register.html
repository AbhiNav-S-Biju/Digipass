<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - DIGIPASS</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23102c26'/%3E%3Cpath d='M20 18h16c9 0 16 6 16 14s-7 14-16 14h-6v10H20V18zm10 20h6c4 0 7-3 7-6s-3-6-7-6h-6v12z' fill='%23f7e7ce'/%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --cream: #f5ead8;
            --cream-light: #fdf6ec;
            --forest: #1b3a2d;
            --forest-mid: #2d5a42;
            --forest-light: #3d7a5a;
            --sand: #e8d9c0;
            --sand-deep: #d4c4a0;
            --text-dark: #1a2e22;
            --text-muted: #5a7260;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'DM Sans', sans-serif;
            color: var(--text-dark);
        }

        body {
            background-color: var(--cream);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Background decoration layer */
        .page-decorations {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        /* Page structure */
        .page-nav {
            position: relative;
            z-index: 10;
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(212, 196, 160, 0.2);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text-dark);
        }

        .nav-logo svg {
            width: 28px;
            height: 28px;
        }

        .nav-logo-text {
            font-family: 'DM Serif Display', serif;
            font-size: 18px;
            font-weight: 600;
            color: var(--forest);
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-link {
            font-size: 13px;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .nav-link:hover {
            color: var(--text-dark);
        }

        .nav-button {
            background: var(--forest);
            color: var(--cream-light);
            border: none;
            padding: 8px 18px;
            border-radius: 7px;
            font-size: 13px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: background 0.2s;
        }

        .nav-button:hover {
            background: var(--forest-mid);
        }

        /* Page content */
        .page-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            z-index: 10;
        }

        /* Auth card */
        .auth-card {
            background: white;
            border: 1px solid rgba(212, 196, 160, 0.4);
            border-radius: 20px;
            padding: 36px 40px 32px;
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 10;
        }

        .card-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .card-logo svg {
            width: 28px;
            height: 28px;
        }

        .card-logo-text {
            font-family: 'DM Serif Display', serif;
            font-size: 16px;
            font-weight: 600;
            color: var(--forest);
        }

        .card-title {
            font-family: 'DM Serif Display', serif;
            font-size: 26px;
            font-weight: 600;
            text-align: center;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .card-subtitle {
            font-size: 13px;
            text-align: center;
            color: var(--text-muted);
            line-height: 1.55;
            margin-bottom: 24px;
        }

        /* Form */
        #registerForm {
            width: 100%;
        }

        .form-field {
            margin-bottom: 14px;
        }

        .form-label {
            display: block;
            font-size: 11.5px;
            font-weight: 600;
            color: var(--text-dark);
            letter-spacing: 0.03em;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .form-control {
            width: 100%;
            padding: 11px 14px;
            background: var(--cream-light);
            border: 1.5px solid var(--sand-deep);
            border-radius: 9px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13.5px;
            color: var(--text-dark);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }

        .form-control::placeholder {
            color: #b8c4bc;
        }

        .form-control:focus {
            border-color: var(--forest-light);
            box-shadow: 0 0 0 3px rgba(61, 122, 90, 0.1);
            background: white;
        }

        /* Password strength meter */
        .password-field {
            margin-bottom: 14px;
        }

        .strength-meter {
            display: flex;
            gap: 4px;
            margin-top: 6px;
            height: 3px;
        }

        .strength-segment {
            flex: 1;
            background: var(--sand-deep);
            border-radius: 2px;
            transition: background 0.2s;
        }

        .strength-meter.weak .strength-segment {
            background: #e05c5c;
        }

        .strength-meter.med .strength-segment {
            background: #efb347;
        }

        .strength-meter.good .strength-segment {
            background: var(--forest-light);
        }

        .strength-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 3px;
        }

        /* Checkbox */
        .checkbox-wrapper {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 14px;
            margin-top: 18px;
        }

        .checkbox-input {
            appearance: none;
            width: 17px;
            height: 17px;
            min-width: 17px;
            min-height: 17px;
            border: 1.5px solid var(--sand-deep);
            border-radius: 4px;
            background: var(--cream-light);
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            margin-top: 2px;
        }

        .checkbox-input:checked {
            background: var(--forest);
            border-color: var(--forest);
        }

        .checkbox-input:checked::after {
            content: '✓';
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            color: white;
            font-size: 11px;
            font-weight: bold;
        }

        .checkbox-label {
            font-size: 12.5px;
            color: var(--text-muted);
            line-height: 1.4;
            cursor: pointer;
            flex: 1;
        }

        .checkbox-label a {
            color: var(--text-dark);
            font-weight: 600;
            text-decoration: none;
        }

        .checkbox-label a:hover {
            text-decoration: underline;
        }

        /* Button */
        .submit-button {
            width: 100%;
            background: var(--forest);
            color: var(--cream-light);
            border: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            padding: 13px;
            border-radius: 9px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s;
            margin-top: 14px;
        }

        .submit-button:hover {
            background: var(--forest-mid);
        }

        .button-icon {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Error message */
        #errorMsg {
            padding: 12px 14px;
            background: #fff5f5;
            border: 1px solid #fed7d7;
            border-radius: 9px;
            color: #742a2a;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        #errorMsg:not(.d-none) {
            display: block;
        }

        /* Card footer links */
        .card-footer {
            margin-top: 18px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .footer-link {
            font-size: 12.5px;
            color: var(--text-muted);
        }

        .footer-link a {
            color: var(--forest);
            font-weight: 600;
            text-decoration: none;
        }

        .footer-link a:hover {
            text-decoration: underline;
        }

        .back-link {
            font-size: 12px;
            color: var(--text-muted);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            justify-content: center;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--text-dark);
        }

        .back-arrow {
            width: 12px;
            height: 12px;
        }

        /* Page footer */
        .page-footer {
            text-align: center;
            padding: 10px 40px 16px;
            font-size: 11.5px;
            color: var(--text-muted);
            position: relative;
            z-index: 5;
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .footer-item {
            display: flex;
            align-items: center;
        }

        .footer-link-text {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-link-text:hover {
            color: var(--text-dark);
        }

        /* Responsive */
        @media (max-width: 640px) {
            .page-decorations {
                display: none;
            }

            .page-nav {
                padding: 14px 1rem;
            }

            .nav-logo-text {
                font-size: 16px;
            }

            .page-content {
                padding: 20px 1rem;
            }

            .auth-card {
                padding: 28px 24px;
                max-width: 100%;
            }

            .card-title {
                font-size: 22px;
            }

            .page-footer {
                padding: 10px 1rem 16px;
            }

            .footer-item:not(:last-child)::after {
                content: '•';
                margin-left: 16px;
                color: var(--sand-deep);
            }
        }
    </style>
</head>

    <script>
        const API_URL = 'https://digipass-3l63.onrender.com';

        // Password strength meter
        const passwordInput = document.getElementById('password');
        const strengthMeter = document.getElementById('strengthMeter');
        const strengthLabel = document.getElementById('strengthLabel');

        passwordInput.addEventListener('input', function() {
            let strength = 0;
            const value = this.value;

            if (value.length >= 8) strength++;
            if (/[A-Z]/.test(value)) strength++;
            if (/[0-9]/.test(value)) strength++;
            if (/[^A-Za-z0-9]/.test(value)) strength++;

            strengthMeter.classList.remove('weak', 'med', 'good');
            
            if (strength <= 1) {
                strengthMeter.classList.add('weak');
                strengthLabel.textContent = 'Weak';
            } else if (strength === 2) {
                strengthMeter.classList.add('med');
                strengthLabel.textContent = 'Medium';
            } else {
                strengthMeter.classList.add('good');
                strengthLabel.textContent = 'Strong';
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                showError('Passwords do not match.');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ full_name: name, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.data.token);
                    localStorage.setItem('user', JSON.stringify({
                        id: data.data.userId,
                        fullName: data.data.fullName,
                        email: data.data.email
                    }));
                    location.href = 'dashboard.html';
                } else {
                    showError(data.message || 'Registration failed. Please try again.');
                }
            } catch (error) {
                console.error(error);
                showError('Unable to connect. Please try again later.');
            }
        });

        function showError(message) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = message;
            errorMsg.classList.remove('d-none');
        }
    </script>
</body>
</html>
