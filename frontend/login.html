<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - DIGIPASS</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23102c26'/%3E%3Cpath d='M20 18h16c9 0 16 6 16 14s-7 14-16 14h-6v10H20V18zm10 20h6c4 0 7-3 7-6s-3-6-7-6h-6v12z' fill='%23f7e7ce'/%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --cream: #f5ead8;
            --cream-light: #fdf6ec;
            --forest: #1b3a2d;
            --forest-mid: #2d5a42;
            --forest-light: #3d7a5a;
            --sand: #e8d9c0;
            --sand-deep: #d4c4a0;
            --text-dark: #1a2e22;
            --text-muted: #5a7260;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'DM Sans', sans-serif;
            color: var(--text-dark);
        }

        body {
            background-color: var(--cream);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Background decoration layer */
        .page-decorations {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        /* Page structure */
        .page-nav {
            position: relative;
            z-index: 10;
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(212, 196, 160, 0.2);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text-dark);
        }

        .nav-logo svg {
            width: 28px;
            height: 28px;
        }

        .nav-logo-text {
            font-family: 'DM Serif Display', serif;
            font-size: 18px;
            font-weight: 600;
            color: var(--forest);
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-link {
            font-size: 13px;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .nav-link:hover {
            color: var(--text-dark);
        }

        .nav-button {
            background: var(--forest);
            color: var(--cream-light);
            border: none;
            padding: 8px 18px;
            border-radius: 7px;
            font-size: 13px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: background 0.2s;
        }

        .nav-button:hover {
            background: var(--forest-mid);
        }

        /* Page content */
        .page-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            z-index: 10;
        }

        /* Auth card */
        .auth-card {
            background: white;
            border: 1px solid rgba(212, 196, 160, 0.4);
            border-radius: 20px;
            padding: 36px 40px 32px;
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 10;
        }

        .card-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .card-logo svg {
            width: 28px;
            height: 28px;
        }

        .card-logo-text {
            font-family: 'DM Serif Display', serif;
            font-size: 16px;
            font-weight: 600;
            color: var(--forest);
        }

        .card-title {
            font-family: 'DM Serif Display', serif;
            font-size: 26px;
            font-weight: 600;
            text-align: center;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .card-subtitle {
            font-size: 13px;
            text-align: center;
            color: var(--text-muted);
            line-height: 1.55;
            margin-bottom: 24px;
        }

        /* Form */
        #loginForm {
            width: 100%;
        }

        .form-field {
            margin-bottom: 14px;
        }

        .form-label {
            display: block;
            font-size: 11.5px;
            font-weight: 600;
            color: var(--text-dark);
            letter-spacing: 0.03em;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .password-label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .password-label-row .form-label {
            margin-bottom: 0;
        }

        .forgot-password {
            font-size: 11px;
            color: var(--forest-light);
            font-weight: 500;
            text-decoration: none;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .form-control {
            width: 100%;
            padding: 11px 14px;
            background: var(--cream-light);
            border: 1.5px solid var(--sand-deep);
            border-radius: 9px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13.5px;
            color: var(--text-dark);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }

        .form-control::placeholder {
            color: #b8c4bc;
        }

        .form-control:focus {
            border-color: var(--forest-light);
            box-shadow: 0 0 0 3px rgba(61, 122, 90, 0.1);
            background: white;
        }

        .trouble-link {
            font-size: 12px;
            color: var(--text-muted);
            text-decoration: none;
            display: block;
            margin-top: 8px;
        }

        .trouble-link:hover {
            color: var(--text-dark);
        }

        /* Button */
        .submit-button {
            width: 100%;
            background: var(--forest);
            color: var(--cream-light);
            border: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            padding: 13px;
            border-radius: 9px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s;
            margin-top: 14px;
        }

        .submit-button:hover {
            background: var(--forest-mid);
        }

        .button-icon {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Error message */
        #errorMsg {
            padding: 12px 14px;
            background: #fff5f5;
            border: 1px solid #fed7d7;
            border-radius: 9px;
            color: #742a2a;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        #errorMsg:not(.d-none) {
            display: block;
        }

        /* Card footer links */
        .card-footer {
            margin-top: 18px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .footer-link {
            font-size: 12.5px;
            color: var(--text-muted);
        }

        .footer-link a {
            color: var(--forest);
            font-weight: 600;
            text-decoration: none;
        }

        .footer-link a:hover {
            text-decoration: underline;
        }

        .back-link {
            font-size: 12px;
            color: var(--text-muted);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            justify-content: center;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--text-dark);
        }

        .back-arrow {
            width: 12px;
            height: 12px;
        }

        /* Page footer */
        .page-footer {
            text-align: center;
            padding: 10px 40px 16px;
            font-size: 11.5px;
            color: var(--text-muted);
            position: relative;
            z-index: 5;
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .footer-item {
            display: flex;
            align-items: center;
        }

        .footer-link-text {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-link-text:hover {
            color: var(--text-dark);
        }

        /* Responsive */
        @media (max-width: 640px) {
            .page-decorations {
                display: none;
            }

            .page-nav {
                padding: 14px 1rem;
            }

            .nav-logo-text {
                font-size: 16px;
            }

            .page-content {
                padding: 20px 1rem;
            }

            .auth-card {
                padding: 28px 24px;
                max-width: 100%;
            }

            .card-title {
                font-size: 22px;
            }

            .page-footer {
                padding: 10px 1rem 16px;
            }

            .footer-item:not(:last-child)::after {
                content: '•';
                margin-left: 16px;
                color: var(--sand-deep);
            }
        }
    </style>
</head>

    <div class="page-content">

                <svg width="28" height="28" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                    <rect width="48" height="48" rx="10" fill="#1b3a2d"/>
                    <rect x="11" y="13" width="22" height="17" rx="4" fill="none" stroke="#fdf6ec" stroke-width="2"/>
                    <path d="M11 21 L33 21" stroke="#fdf6ec" stroke-width="1.5" fill="none"/>
                    <rect x="14" y="25" width="6" height="4" rx="1" fill="#8cbf9c"/>
                    <rect x="22" y="25" width="6" height="4" rx="1" fill="#8cbf9c" opacity=".45"/>
                    <path d="M31 9 L31 14" stroke="#fdf6ec" stroke-width="2" stroke-linecap="round"/>

                </svg>

            </div>

            <h1 class="card-title">Welcome Back</h1>
            <p class="card-subtitle">Sign in to access your digital estate and assets</p>

            <div id="errorMsg" class="d-none"></div>

            <form id="loginForm">
                <div class="form-field">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="your@email.com" required>
                </div>

                <div class="form-field">
                    <div class="password-label-row">
                        <label for="password" class="form-label">Password</label>
                        <a href="#" class="forgot-password">Forgot?</a>
                    </div>
                    <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
                    <a href="#" class="trouble-link">Having trouble signing in?</a>
                </div>

                <button type="submit" class="submit-button">
                    <svg class="button-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                    Sign In
                </button>
            </form>

                <div class="footer-link">
                    Don't have an account? <a href="register.html">Create one</a>
                </div>
                <a href="index.html" class="back-link">
                    <svg class="back-arrow" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

    <script>
        const API_URL = 'https://digipass-3l63.onrender.com';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.data.token);
                    localStorage.setItem('user', JSON.stringify({
                        id: data.data.userId,
                        fullName: data.data.fullName,
                        email: data.data.email
                    }));
                    location.href = 'dashboard.html';
                } else {
                    showError(data.message || 'Login failed. Please try again.');
                }
            } catch (error) {
                console.error(error);
                showError('Unable to connect. Please try again later.');
            }
        });

        function showError(message) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = message;
            errorMsg.classList.remove('d-none');
        }
    </script>
