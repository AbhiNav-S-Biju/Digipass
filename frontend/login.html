<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - DIGIPASS</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23102c26'/%3E%3Cpath d='M20 18h16c9 0 16 6 16 14s-7 14-16 14h-6v10H20V18zm10 20h6c4 0 7-3 7-6s-3-6-7-6h-6v12z' fill='%23f7e7ce'/%3E%3C/svg%3E">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            line-height: 1.6;
            color: #2d2d2d;
            background: #f7e7ce;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navigation */
        nav {
            background: white;
            border-bottom: 1px solid #e8e0d0;
            padding: 1.5rem 0;
        }

        nav .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 700;
            color: #102c26;
        }

        nav a {
            color: #2d2d2d;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        nav a:hover {
            color: #102c26;
        }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 2.5rem;
            border-radius: 8px;
            border: 1px solid #e8e0d0;
        }

        .auth-container h1 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #102c26;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .auth-container h2 {
            font-size: 1.1rem;
            color: #555;
            text-align: center;
            margin-bottom: 2rem;
            font-weight: 500;
        }

        /* Message Box */
        #message {
            margin-bottom: 1.5rem;
        }

        .error-message {
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #991b1b;
            padding: 1rem;
            border-radius: 4px;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .success-message {
            background: #dcfce7;
            border: 1px solid #bbf7d0;
            color: #166534;
            padding: 1rem;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .error-dismiss, .success-dismiss {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: inherit;
        }

        /* Forms */
        form {
            display: grid;
            gap: 1.5rem;
        }

        .form-group {
            display: grid;
            gap: 0.5rem;
        }

        .form-group label {
            font-weight: 600;
            color: #1f2937;
            font-size: 0.95rem;
        }

        .form-group input {
            padding: 0.75rem;
            border: 1px solid #d8def0;
            border-radius: 4px;
            font-size: 0.95rem;
            font-family: inherit;
            background: #fbfcff;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #102c26;
            background: white;
        }

        .form-group input.input-error {
            border-color: #dc2626;
            background: #fef2f2;
        }

        .field-error {
            color: #991b1b;
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }

        /* Buttons */
        .btn-primary {
            background: #102c26;
            color: white;
            padding: 0.85rem;
            border: none;
            border-radius: 4px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary:hover {
            background: #081a16;
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-primary.loading {
            position: relative;
            color: transparent;
        }

        .spinner {
            display: inline-block;
            width: 1em;
            height: 1em;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Links */
        .auth-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #555;
        }

        .auth-link a {
            color: #102c26;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-link a:hover {
            text-decoration: underline;
        }

        /* Footer */
        footer {
            padding: 2rem 0;
            border-top: 1px solid #e8e0d0;
            background: white;
            text-align: center;
            color: #999;
            font-size: 0.85rem;
        }

        footer .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }

        @media (max-width: 480px) {
            .auth-container { padding: 1.5rem; max-width: 100%; }
            .auth-container h1 { font-size: 1.1rem; }
            .auth-container h2 { font-size: 0.95rem; margin-bottom: 1.25rem; }
            form { gap: 1rem; }
            .form-group label { font-size: 0.9rem; }
            .form-group input { font-size: 0.9rem; padding: 0.65rem; }
            .btn-primary { font-size: 0.9rem; padding: 0.7rem; }
            .auth-link { font-size: 0.8rem; margin-top: 1rem; }
            .error-message, .success-message { font-size: 0.85rem; padding: 0.75rem; }
            nav { padding: 1rem 0; }
            nav .container { padding: 0 15px; }
            .logo { font-size: 1rem; }
            nav a { font-size: 0.85rem; }
            main { padding: 30px 15px; }
            footer { padding: 1.5rem 0; font-size: 0.75rem; }
        }

        @media (max-width: 768px) {
            .auth-container { padding: 2rem; }
            .auth-container h2 { margin-bottom: 1.5rem; }
            form { gap: 1.25rem; }
            nav { padding: 1.25rem 0; }
            nav .container { padding: 0 20px; }
            nav a { font-size: 0.9rem; }
            main { padding: 40px 20px; }
            footer { padding: 2rem 0; font-size: 0.8rem; }
        }

        @media (max-width: 834px) {
            nav .container { max-width: 700px; }
            footer .container { max-width: 700px; }
        }

        @media (max-width: 1024px) {
            nav .container { max-width: 800px; }
            footer .container { max-width: 800px; }
        }

        @media (max-width: 1440px) {
            nav .container { max-width: 1000px; }
            footer .container { max-width: 1000px; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="container">
            <div class="logo">DIGIPASS</div>
            <a href="index.html">Back to Home</a>
        </div>
    </nav>

    <main>
        <div class="auth-container">
            <h1>DIGIPASS</h1>
            <h2>Sign In</h2>
            
            <div id="message"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required aria-describedby="email-error">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required aria-describedby="password-error">
                </div>

                <button type="submit" class="btn-primary">Sign In</button>
            </form>

            <p class="auth-link">
                Don't have an account? <a href="register.html">Create one</a>
            </p>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 DIGIPASS. Keep your digital affairs in order.</p>
        </div>
    </footer>

    <script src="js/login.js?v=3"></script>
</body>
</html>
